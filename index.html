<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Church Program Player</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;overflow:hidden;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}
#app{position:fixed;inset:0;background:#000}
#player,#player iframe,#html5{position:absolute;inset:0;width:100%;height:100%;border:0}
#html5{object-fit:contain;background:#000;display:none}
#shield{position:absolute;inset:0;z-index:20;background:transparent}
#logo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#ffffff;z-index:30;opacity:0;transform:scale(.8);transition:opacity .6s ease,transform .6s ease;pointer-events:none}
#logo.show{opacity:1;transform:scale(1)}
#logo img,#logo video{max-width:78%;max-height:78%;object-fit:contain}
#logo .fallback{color:#15357a;font-size:clamp(20px,4.5vw,46px);font-weight:800;letter-spacing:1px;text-align:center;padding:0 24px;line-height:1.2}
#controls{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:45;display:flex;gap:14px;align-items:center;background:rgba(0,0,0,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);padding:10px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .3s}
#controls.show{opacity:1;pointer-events:auto}
#controls button{width:54px;height:54px;border:0;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
#controls button:hover{background:rgba(255,255,255,.28)}
#controls #playBtn{width:62px;height:62px;font-size:26px;background:rgba(30,125,52,.9)}
#controls #playBtn:hover{background:rgba(35,151,62,.95)}
#controls #ccBtn{font-size:16px;font-weight:800;letter-spacing:.5px;opacity:.55}
#controls #ccBtn.on{opacity:1;background:rgba(30,125,52,.9)}
#controls #ccBtn.on:hover{background:rgba(35,151,62,.95)}
#maxBtn{position:absolute;top:18px;right:18px;z-index:46;width:54px;height:54px;border:0;border-radius:50%;background:rgba(0,0,0,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);color:#fff;font-size:24px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
#maxBtn.show{opacity:1;pointer-events:auto}
#maxBtn:hover{background:rgba(0,0,0,.75)}
#start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0b0b;z-index:50;color:#fff;text-align:center;padding:24px}
#start h1{font-size:clamp(20px,4vw,40px);margin-bottom:10px}
#start p{opacity:.65;margin-bottom:28px;font-size:clamp(13px,2vw,18px);max-width:640px}
#startBtn{font-size:clamp(18px,3vw,28px);padding:18px 46px;border:0;border-radius:999px;background:#1e7d34;color:#fff;cursor:pointer}
#startBtn:hover{background:#23973e}
#err{color:#ff6b6b;margin-top:18px;max-width:640px}
</style>
</head>
<body>
<div id="app">
<div id="player"></div>
<video id="html5" playsinline></video>
<div id="shield"></div>
<div id="logo"></div>
<div id="controls">
<button id="prevBtn" title="Previous section (Shift + Left arrow)">&#9198;</button>
<button id="backBtn" title="Rewind 10s (Left arrow / J)">&#9194;</button>
<button id="playBtn" title="Pause / Play (Space)">&#9208;</button>
<button id="fwdBtn" title="Forward 10s (Right arrow / L)">&#9193;</button>
<button id="nextBtn" title="Next section (Shift + Right arrow)">&#9197;</button>
<button id="ccBtn" title="Captions">CC</button>
</div>
<button id="maxBtn" title="Full screen">&#9974;</button>
<div id="start">
<h1>Church Program</h1>
<p>Press start to play full-screen. Sections play in order, with the church logo animated between each. Move the mouse for Prev / Pause / Next.</p>
<button id="startBtn">&#9654; Start Program</button>
<div id="err"></div>
</div>
</div>
<script>
(function(){
var q=new URLSearchParams(location.search);
var videoUrl=(q.get('video')||'').trim();
var logoUrl=(q.get('logo')||'').trim()||'logo.png';
var logoSec=Math.max(1,parseInt(q.get('logoSec')||'1',10)||1);
var gsRate=parseFloat(q.get('gsRate'))||1;
var revealHold=Math.max(0,parseFloat(q.get('reveal'))||3.5);
var SKIP=Math.max(1,parseFloat(q.get('skip'))||10);
var QUALITY=(q.get('quality')||'max').toLowerCase();
var ccOn=(q.get('cc')==='1');
var TICK=200, GAP_TICKS=Math.round(logoSec*1000/TICK), REVEAL_TICKS=Math.round(revealHold*1000/TICK);
function rng(v){var a=(v||'').split('-');return{start:parseFloat(a[0])||0,end:parseFloat(a[1])||0}}
var sections=[];
var sj=q.get('sections');
if(sj){try{var arr=JSON.parse(sj);if(Array.isArray(arr)){arr.forEach(function(o){var st=Number(o.start)||0,en=Number(o.end)||0;if(en>st)sections.push({name:String(o.name||'Section'),start:st,end:en,rate:parseFloat(o.rate)||1})})}}catch(e){}}
if(!sections.length){sections=[Object.assign({name:'GHS',rate:1},rng(q.get('ghs'))),Object.assign({name:'Choir Song',rate:1},rng(q.get('choir'))),Object.assign({name:'GS Message',rate:gsRate},rng(q.get('gs')))].filter(function(s){return s.end>s.start})}
var app=document.getElementById('app'),elStart=document.getElementById('start'),elErr=document.getElementById('err'),elLogo=document.getElementById('logo'),elHtml5=document.getElementById('html5'),elControls=document.getElementById('controls'),playBtn=document.getElementById('playBtn'),maxBtn=document.getElementById('maxBtn'),ccBtn=document.getElementById('ccBtn');
if(/\.(mp4|webm|m4v)(\?|$)/i.test(logoUrl)){var v=document.createElement('video');v.src=logoUrl;v.autoplay=true;v.muted=true;v.loop=true;v.setAttribute('playsinline','');elLogo.appendChild(v);}
else{var img=document.createElement('img');img.src=logoUrl;img.alt='Church logo';img.onerror=function(){this.remove();var d=document.createElement('div');d.className='fallback';d.textContent='DEEPER LIFE BIBLE CHURCH';elLogo.appendChild(d);};elLogo.appendChild(img);}
if(!videoUrl){elErr.textContent='No video link provided.';return}
if(!sections.length){elErr.textContent='No valid sections - check the start/end times.';return}
function ytId(u){var m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|live\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);return m?m[1]:null}
var YTID=ytId(videoUrl),isHls=/\.m3u8(\?|$)/i.test(videoUrl);
var idx=0,phase='idle',paused=false,gapLeft=0,holdLeft=0,seekTicks=0,ytState=-1,started=false,playedAny=false;var engine={ready:false};
function showLogo(on,instant){if(instant){elLogo.style.transition='none';elLogo.classList.toggle('show',on);void elLogo.offsetWidth;elLogo.style.transition='';}else{elLogo.classList.toggle('show',on)}}
function beginSection(i){idx=i;phase='seeking';seekTicks=0;showLogo(true);engine.mute&&engine.mute();engine.seekPlay(sections[i].start);engine.setRate&&engine.setRate(sections[i].rate||1)}
function toGap(){phase='gap';gapLeft=GAP_TICKS;engine.mute&&engine.mute();showLogo(true);var nx=sections[idx+1];if(nx&&engine.canPrebuffer&&engine.seek){try{engine.seek(nx.start)}catch(e){}}}
function tick(){
if(paused||phase==='idle'||phase==='done')return;
if(phase==='gap'){if(--gapLeft<=0){if(idx+1<sections.length){beginSection(idx+1)}else{phase='done';if(!playedAny)showLogo(false)}}return;}
var s=sections[idx];if(!s)return;var t=engine.time();
if(phase==='seeking'){seekTicks++;if((engine.playing&&engine.playing()&&t>=s.start-0.5&&t<s.end)||seekTicks>40){phase='holding';holdLeft=REVEAL_TICKS;}return;}
if(phase==='holding'){if(t>=s.end-0.25){toGap();return;}if(--holdLeft<=0){phase='playing';playedAny=true;showLogo(false);engine.unmute&&engine.unmute();engine.setRate&&engine.setRate(s.rate||1);}return;}
if(phase==='playing'){if(t>=s.end-0.25){toGap()}}
}
function initYouTube(){var p=null;engine.canPrebuffer=false;var tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.head.appendChild(tag);window.onYouTubeIframeAPIReady=function(){p=new YT.Player('player',{videoId:YTID,playerVars:{controls:0,rel:0,modestbranding:1,fs:1,disablekb:1,playsinline:1,iv_load_policy:3,autoplay:0},events:{onReady:function(){engine.ready=true;engine.captions&&engine.captions(ccOn);setTimeout(function(){engine.captions&&engine.captions(ccOn)},1500)},onApiChange:function(){engine.captions&&engine.captions(ccOn)},onStateChange:function(e){ytState=e.data;if(!ccOn&&engine.captions)engine.captions(false)},onError:function(){elErr.textContent='This video cannot be embedded/played. Use your own (unlisted) upload or a direct video link.';elStart.style.display='flex';showLogo(false)}}})};engine.seekPlay=function(s){if(p){p.seekTo(s,true);p.playVideo()}};engine.pause=function(){if(p)p.pauseVideo()};engine.resume=function(){if(p)p.playVideo()};engine.time=function(){return p&&p.getCurrentTime?p.getCurrentTime():0};engine.playing=function(){return ytState===1};engine.unmute=function(){if(p){p.unMute();p.setVolume(100)}};engine.mute=function(){if(p)p.mute()};engine.kick=function(){if(p)p.playVideo()};engine.setRate=function(r){if(p&&p.setPlaybackRate){try{p.setPlaybackRate(r)}catch(e){}}};engine.seek=function(t){if(p)p.seekTo(t,false)};engine.captions=function(on){if(!p)return;function op(m,o,v){try{p.setOption&&p.setOption(m,o,v)}catch(e){}}function um(m){try{p.unloadModule&&p.unloadModule(m)}catch(e){}}if(on){try{p.loadModule&&p.loadModule('captions')}catch(e){}var tl;try{tl=p.getOption&&p.getOption('captions','tracklist')}catch(e2){}op('captions','track',(tl&&tl.length)?tl[0]:{languageCode:(navigator.language||'en').slice(0,2)||'en'})}else{op('captions','track',{});op('cc','track',{});um('captions');um('cc')}};engine.bufferedTo=function(){return(p&&p.getVideoLoadedFraction&&p.getDuration)?p.getVideoLoadedFraction()*p.getDuration():0}}
function initHtml5(){engine.canPrebuffer=true;document.getElementById('player').style.display='none';elHtml5.style.display='block';elHtml5.preload='auto';if(isHls&&!elHtml5.canPlayType('application/vnd.apple.mpegurl')){var h=document.createElement('script');h.src='https://cdn.jsdelivr.net/npm/hls.js@1';h.onload=function(){var hls=new Hls({maxBufferLength:120,maxMaxBufferLength:1800,maxBufferSize:600*1000*1000,backBufferLength:30,capLevelToPlayerSize:false});hls.loadSource(videoUrl);hls.attachMedia(elHtml5);hls.on(Hls.Events.MANIFEST_PARSED,function(){engine.ready=true;try{var L=hls.levels||[],i;if(L.length&&QUALITY!=='auto'){var top=0;for(i=1;i<L.length;i++){if((L[i].height||L[i].bitrate||0)>(L[top].height||L[top].bitrate||0))top=i}if(QUALITY==='max'){hls.autoLevelCapping=top}else{var cap=parseInt(QUALITY,10)||0,best=-1;for(i=0;i<L.length;i++){var hh=L[i].height||0;if(hh<=cap&&(best<0||hh>(L[best].height||0)))best=i}hls.autoLevelCapping=(best>=0?best:top)}}}catch(e){}})};document.head.appendChild(h)}else{elHtml5.src=videoUrl;elHtml5.addEventListener('loadedmetadata',function(){engine.ready=true});elHtml5.load()}engine.seekPlay=function(s){try{elHtml5.currentTime=s}catch(e){}var pr=elHtml5.play();if(pr&&pr.catch)pr.catch(function(){})};engine.pause=function(){elHtml5.pause()};engine.resume=function(){elHtml5.play()};engine.time=function(){return elHtml5.currentTime||0};engine.playing=function(){return !elHtml5.paused&&elHtml5.readyState>=3};engine.unmute=function(){elHtml5.muted=false;elHtml5.volume=1};engine.mute=function(){elHtml5.muted=true};engine.kick=function(){var pr=elHtml5.play();if(pr&&pr.catch)pr.catch(function(){})};engine.setRate=function(r){try{elHtml5.playbackRate=r}catch(e){}};engine.seek=function(t){try{elHtml5.currentTime=t}catch(e){}};engine.captions=function(on){try{var tt=elHtml5.textTracks||[];for(var i=0;i<tt.length;i++)tt[i].mode=on?'showing':'disabled'}catch(e){}};elHtml5.addEventListener('loadedmetadata',function(){engine.captions(ccOn)});try{elHtml5.textTracks.addEventListener('addtrack',function(){engine.captions(ccOn)})}catch(e){}engine.bufferedTo=function(){var b=elHtml5.buffered;return(b&&b.length)?b.end(b.length-1):0}}
if(YTID)initYouTube();else initHtml5();setInterval(tick,TICK);
var hideTimer=null;
function showControls(){if(phase==='idle')return;elControls.classList.add('show');clearTimeout(hideTimer);if(!paused){hideTimer=setTimeout(function(){elControls.classList.remove('show')},2800)}}
function setPlayIcon(){playBtn.innerHTML=paused?'&#9654;':'&#9208;'}
function togglePause(){if(phase==='idle')return;paused=!paused;if(paused){engine.pause&&engine.pause()}else{engine.resume&&engine.resume()}setPlayIcon();showControls()}
function gotoSection(i){if(i<0||i>=sections.length)return;if(paused){paused=false;setPlayIcon()}engine.resume&&engine.resume();beginSection(i);showControls()}
function nextSec(){gotoSection(idx+1)}
function prevSec(){gotoSection(idx-1)}
function skip(delta){if(phase==='idle'||phase==='gap'||phase==='done')return;var s=sections[idx];if(!s)return;var t=Math.min(Math.max(engine.time()+delta,s.start),s.end-0.3);engine.seek&&engine.seek(t);if(paused){engine.pause&&engine.pause()}else{engine.resume&&engine.resume()}showControls()}
function fwd(){skip(SKIP)}
function back(){skip(-SKIP)}
document.getElementById('prevBtn').onclick=prevSec;
document.getElementById('nextBtn').onclick=nextSec;
document.getElementById('backBtn').onclick=back;
document.getElementById('fwdBtn').onclick=fwd;
function updateCcBtn(){ccBtn.classList.toggle('on',ccOn);ccBtn.title='Captions '+(ccOn?'on':'off')+' (C)'}
function toggleCc(){ccOn=!ccOn;engine.captions&&engine.captions(ccOn);updateCcBtn();showControls()}
ccBtn.onclick=toggleCc;updateCcBtn();
playBtn.onclick=togglePause;
['mousemove','touchstart'].forEach(function(ev){document.addEventListener(ev,showControls,{passive:true})});
function enterFs(){var fs=app.requestFullscreen||app.webkitRequestFullscreen||app.msRequestFullscreen;if(fs){try{fs.call(app)}catch(e){}}}
function isFs(){return !!(document.fullscreenElement||document.webkitFullscreenElement||document.msFullscreenElement)}
function updateMaxBtn(){maxBtn.classList.toggle('show',started&&!isFs())}
maxBtn.onclick=enterFs;
['fullscreenchange','webkitfullscreenchange','msfullscreenchange'].forEach(function(ev){document.addEventListener(ev,updateMaxBtn)});
function startProgram(){started=true;showLogo(true,true);elStart.style.display='none';enterFs();paused=false;setPlayIcon();engine.unmute&&engine.unmute();engine.kick&&engine.kick();setTimeout(updateMaxBtn,500);var tries=0;(function go(){if(engine.ready){beginSection(0);showControls()}else if(tries++<80){setTimeout(go,150)}else{beginSection(0)}})()}
document.getElementById('startBtn').addEventListener('click',startProgram);
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();togglePause()}else if(e.code==='ArrowRight'){e.preventDefault();e.shiftKey?nextSec():fwd()}else if(e.code==='ArrowLeft'){e.preventDefault();e.shiftKey?prevSec():back()}else if(e.code==='KeyL'){e.preventDefault();fwd()}else if(e.code==='KeyJ'){e.preventDefault();back()}else if(e.code==='KeyC'){e.preventDefault();toggleCc()}else{showControls()}});
})();
</script>
</body>
</html>
